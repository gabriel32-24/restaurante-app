<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <h1>🍽️ Restaurante</h1>
    <p class="subtitulo">Gestión de Pedidos en Tiempo Real</p>

    <form id="form-login">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" placeholder="Ej: mozo1" required />

      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" placeholder="••••••" required />

      <button type="submit">Ingresar</button>
      <p id="mensaje-error" class="mensaje-error"></p>
    </form>

    <div class="ayuda-demo">
      <p><strong>Usuarios de prueba</strong> (ver backend/seed.js):</p>
      <p>mozo1 / 123456 — cocinero1 / 123456</p>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
